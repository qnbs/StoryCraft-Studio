name: Setup Node.js and install dependencies

description: "Checkout repository, configure Node.js, restore npm and Playwright caches, and install dependencies only when needed."

inputs:
  node-version:
    description: 'Node.js version to use.'
    required: false
    default: 'lts/*'
  install-command:
    description: 'Install command to execute.'
    required: false
    default: 'npm ci --legacy-peer-deps'
  cache-path:
    description: 'Path to the npm cache directory.'
    required: false
    default: '~/.npm'
  playwright-cache-path:
    description: 'Path to the Playwright browser cache directory.'
    required: false
    default: '~/.cache/ms-playwright'
  lockfile-path:
    description: 'Lockfile used to derive the cache key (package-lock.json, yarn.lock, pnpm-lock.yaml).'
    required: false
    default: 'package-lock.json'

runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Restore npm cache
      id: npm-cache
      uses: actions/cache@v4
      with:
        path: ${{ inputs.cache-path }}
        key: npm-cache-${{ runner.os }}-${{ hashFiles(inputs.lockfile-path) }}
        restore-keys: |
          npm-cache-${{ runner.os }}-

    - name: Restore node_modules cache
      id: node-modules-cache
      uses: actions/cache@v4
      with:
        path: node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles(inputs.lockfile-path) }}
        restore-keys: |
          node-modules-${{ runner.os }}-

    - name: Restore Playwright browser cache
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ${{ inputs.playwright-cache-path }}
        key: playwright-browsers-${{ runner.os }}-${{ hashFiles(inputs.lockfile-path) }}
        restore-keys: |
          playwright-browsers-${{ runner.os }}-

    - name: Install dependencies if node_modules cache missed
      if: steps.node-modules-cache.outputs.cache-hit != 'true'
      run: ${{ inputs.install-command }}
