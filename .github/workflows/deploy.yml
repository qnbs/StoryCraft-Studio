# ============================================================
# GitHub Pages Deployment Workflow für StoryCraft Studio
# Offizielle 2026 Best-Practice Konfiguration
# ============================================================

name: Deploy to GitHub Pages

# Trigger: Push auf main oder manuell
on:
  push:
    branches: [main]
  workflow_dispatch:

# Berechtigungen für GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Verhindere gleichzeitige Deployments
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ============================================================
  # BUILD JOB
  # ============================================================
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Repository auschecken
      - name: Checkout Repository
        uses: actions/checkout@v5

      # 2. Node.js Setup mit npm Cache
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      # 3. Dependencies installieren (clean install)
      - name: Install Dependencies
        run: npm ci

      # 4. Produktion-Build erstellen
      - name: Build Application
        run: npm run build
        env:
          NODE_ENV: production

      # 5. GitHub Pages konfigurieren
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 6. Build-Artefakte hochladen
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # ============================================================
  # DEPLOY JOB
  # ============================================================
  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    # GitHub Pages Environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Deployment zu GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
