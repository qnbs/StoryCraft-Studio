# ============================================================
# StoryCraft Studio – Complete CI/CD Pipeline
# lint → typecheck → test → build → deploy
# ============================================================

name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ============================================================
# SHARED SETUP STEP (composite-like via job output)
# ============================================================
jobs:

  # ----------------------------------------------------------
  # 1. LINT
  # ----------------------------------------------------------
  lint:
    name: 🔍 Lint (ESLint + Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint -- --max-warnings 0
        continue-on-error: true   # Informational until all lint issues resolved

  # ----------------------------------------------------------
  # 2. TYPECHECK
  # ----------------------------------------------------------
  typecheck:
    name: 🏷️ TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tsc --noEmit
        run: npm run typecheck
        continue-on-error: true   # Shows errors but doesn't block deploy

  # ----------------------------------------------------------
  # 3. UNIT TESTS
  # ----------------------------------------------------------
  test:
    name: 🧪 Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        run: npm run test:run

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # ----------------------------------------------------------
  # 4. BUILD
  # ----------------------------------------------------------
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # ----------------------------------------------------------
  # 5. DEPLOY (only on main branch push)
  # ----------------------------------------------------------
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
