# ============================================================
# StoryCraft Studio – CI/CD Pipeline
# security → lint → typecheck → test → build → lighthouse → storybook → deploy
# ============================================================

name: CI / CD

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------
  # 0. SECURITY: pnpm audit + dependency review
  # ----------------------------------------------------------
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (high + critical)
        run: pnpm audit --audit-level=high

      - name: Dependency review (PRs only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

  # ----------------------------------------------------------
  # 1. QUALITY GATE: Lint + Typecheck + Tests (parallel matrix)
  # ----------------------------------------------------------
  quality:
    name: 🔍 Quality Gate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [security]
    strategy:
      fail-fast: false
      matrix:
        node-version: [lts/*, node]
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm run lint -- --max-warnings 0

      - name: Typecheck (tsc)
        run: pnpm run typecheck

      - name: Unit tests (Vitest)
        run: pnpm exec vitest run --coverage

      - name: Upload coverage report
        if: always() && matrix.node-version == 'lts/*'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Publish coverage to Codecov
        if: always() && matrix.node-version == 'lts/*'
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [ -n "$CODECOV_TOKEN" ]; then
            pnpm dlx codecov -f coverage/lcov.info
          else
            echo "No CODECOV_TOKEN configured; skipping Codecov upload."
          fi

  # ----------------------------------------------------------
  # 2. BUILD: Production build + Pages artifact upload
  # ----------------------------------------------------------
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality]
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./dist
          retention-days: 7

      - name: Setup Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ----------------------------------------------------------
  # 3. DEPLOY: GitHub Pages (only on main push)
  # ----------------------------------------------------------
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ----------------------------------------------------------
  # 4. LIGHTHOUSE: Performance budgets (after build)
  # ----------------------------------------------------------
  lighthouse:
    name: 🔦 Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: Run Lighthouse CI
        run: |
          pnpm dlx serve -s dist -l 4173 &
          pnpm exec wait-on http://127.0.0.1:4173 --timeout 30000
          pnpm exec lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 14

  # ----------------------------------------------------------
  # 5. STORYBOOK: Build + artifact (parallel with build)
  # ----------------------------------------------------------
  storybook:
    name: 📖 Storybook
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm exec storybook build --output-dir storybook-static

      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook
          path: storybook-static/
          retention-days: 14
