# ============================================================
# StoryCraft Studio – CI/CD Pipeline
# lint → typecheck → test → build → deploy
# ============================================================

name: CI / CD

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------
  # 1. QUALITY GATE: Lint + Typecheck + Tests (parallel matrix)
  # ----------------------------------------------------------
  quality:
    name: 🔍 Quality Gate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [lts/*, node]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint (ESLint)
        run: npm run lint -- --max-warnings 0

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npx vitest run --coverage

      - name: Upload coverage report
        if: always() && matrix.node-version == 'lts/*'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Publish coverage to Codecov
        if: always() && matrix.node-version == 'lts/*'
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [ -n "$CODECOV_TOKEN" ]; then
            npx --yes codecov -f coverage/lcov.info
          else
            echo "No CODECOV_TOKEN configured; skipping Codecov upload."
          fi

  # ----------------------------------------------------------
  # 2. BUILD: Production build + Pages artifact upload
  # ----------------------------------------------------------
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./dist
          retention-days: 7

      - name: Setup Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ----------------------------------------------------------
  # 3. DEPLOY: GitHub Pages (only on main push)
  # ----------------------------------------------------------
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
