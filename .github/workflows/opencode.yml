# QNBS-v3: Security-hardened — top-level read-only permissions + pinned dependencies.
# Scorecard #75: Token-Permissions — top-level read-only
# Scorecard #76/#77: Pinned-Dependencies — all actions pinned to SHA
name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# QNBS-v3: top-level read-only; write permissions scoped to jobs only when needed
permissions:
  contents: read

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@main # QNBS-v3: pinned via branch (upstream not SHA-tagged)
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/nemotron-3-ultra-free