# Desktop bundles — manual or tagged releases (does not block web CI).
# Produces installable artifacts per OS under Actions → workflow run → Artifacts.

name: Tauri desktop build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: tauri-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle:
    name: Bundle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: windows-latest
          - os: macos-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies (WebKitGTK)
        if: contains(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm exec tauri build

      - name: Upload bundle directory
        uses: actions/upload-artifact@v6
        with:
          name: tauri-bundle-${{ matrix.os }}
          path: src-tauri/target/release/bundle/
          if-no-files-found: warn
          retention-days: 14
