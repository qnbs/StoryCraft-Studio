<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <title>Offline — StoryCraft Studio</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:        #020617;
        --bg2:       #0f172a;
        --bg3:       #1e293b;
        --fg:        #f8fafc;
        --fg-muted:  #64748b;
        --indigo:    #6366f1;
        --border:    rgba(255,255,255,0.08);
      }

      html, body {
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 2rem;
        text-align: center;
      }

      /* Animated orbs */
      .orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.12;
        pointer-events: none;
        animation: drift 8s ease-in-out infinite alternate;
      }
      .orb-1 { width: 600px; height: 600px; background: #6366f1; top: -200px; left: -200px; }
      .orb-2 { width: 500px; height: 500px; background: #a855f7; bottom: -200px; right: -200px; animation-delay: -4s; }

      @keyframes drift {
        from { transform: translate(0, 0) scale(1); }
        to   { transform: translate(40px, 30px) scale(1.05); }
      }

      .card {
        position: relative;
        max-width: 420px;
        width: 100%;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 3rem 2rem;
        box-shadow: 0 25px 50px rgba(0,0,0,0.6);
      }

      .logo {
        width: 72px;
        height: 72px;
        margin: 0 auto 1.5rem;
        background: linear-gradient(135deg, #6366f1, #a855f7);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        font-weight: 700;
        color: #fff;
        box-shadow: 0 8px 24px rgba(99,102,241,0.4);
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
        letter-spacing: -0.02em;
      }

      p {
        color: var(--fg-muted);
        font-size: 0.9375rem;
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.8125rem;
        color: #fbbf24;
        background: rgba(251,191,36,0.1);
        border: 1px solid rgba(251,191,36,0.25);
        border-radius: 999px;
        padding: 0.375rem 0.875rem;
        margin-bottom: 1.75rem;
      }
      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #fbbf24;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,100% { opacity:1; }
        50%      { opacity:0.3; }
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1.5rem;
        background: var(--indigo);
        color: #fff;
        font-size: 0.9375rem;
        font-weight: 600;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.15s, transform 0.1s;
        box-shadow: 0 4px 14px rgba(99,102,241,0.4);
      }
      .btn:hover  { background: #4f46e5; }
      .btn:active { transform: scale(0.96); }

      .hint {
        margin-top: 1.5rem;
        font-size: 0.8125rem;
        color: var(--fg-muted);
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg:  #f8fafc;
          --bg2: #ffffff;
          --fg:  #0f172a;
          --fg-muted: #64748b;
          --border: rgba(0,0,0,0.08);
        }
        .orb { opacity: 0.06; }
      }
    </style>
  </head>
  <body>
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>

    <div class="card">
      <div class="logo" aria-hidden="true">S</div>

      <div class="status">
        <span class="status-dot"></span>
        Offline
      </div>

      <h1>Keine Internetverbindung</h1>
      <p>
        StoryCraft Studio ist gerade offline. Alle deine gespeicherten Geschichten und Charaktere
        sind weiterhin in deinem Browser verfügbar.
      </p>

      <a href="/StoryCraft-Studio/" class="btn">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/>
        </svg>
        Zur App
      </a>

      <p class="hint">Wird automatisch fortgesetzt, sobald die Verbindung wiederhergestellt ist.</p>
    </div>

    <script>
      // Auto-reload when connectivity is restored
      window.addEventListener('online', () => {
        window.location.href = '/StoryCraft-Studio/';
      });
    </script>
  </body>
</html>
