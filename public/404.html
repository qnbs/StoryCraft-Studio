<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StoryCraft Studio</title>
  <script>
    // GitHub Pages SPA Redirect
    // Konvertiert 404 zu einem Query-Parameter für den Router
    (function() {
      var base = '/StoryCraft-Studio/';
      var path = window.location.pathname;
      
      // Entferne Base-Pfad
      var relativePath = path.replace(base, '');
      
      // Wenn wir nicht auf der Startseite sind, redirect mit Query-Parameter
      if (relativePath && relativePath !== '' && relativePath !== 'index.html') {
        var target = base + '?p=' + encodeURIComponent('/' + relativePath + window.location.search + window.location.hash);
        window.location.replace(target);
      } else {
        // Fallback zur Hauptseite
        window.location.replace(base);
      }
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/StoryCraft-Studio/">
  </noscript>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
