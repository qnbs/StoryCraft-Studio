<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Manifest & Icons ───────────────────────────────── -->
    <link rel="manifest" href="/StoryCraft-Studio/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/StoryCraft-Studio/favicon.svg" />
    <link rel="apple-touch-icon" href="/StoryCraft-Studio/favicon.svg" />

    <!-- ── Viewport & Theme ──────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="dark light" />

    <!-- ── SEO & Social ───────────────────────────────────── -->
    <meta name="description" content="AI-Powered Creative Writing Studio — craft entire novels, characters & worlds with Gemini AI. Works offline." />
    <meta name="keywords" content="creative writing, AI writing assistant, novel writer, story generator, character builder, world building" />
    <meta name="author" content="StoryCraft Studio" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="StoryCraft Studio" />
    <meta property="og:title"       content="StoryCraft Studio — AI Creative Writing" />
    <meta property="og:description" content="Craft entire novels, characters & worlds with Gemini AI. Works offline as a PWA." />
    <meta property="og:url"         content="https://storycraft-studio.app/StoryCraft-Studio/" />
    <meta property="og:image"       content="/StoryCraft-Studio/favicon.svg" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="StoryCraft Studio" />
    <meta name="twitter:description" content="AI-Powered Creative Writing Studio — Gemini AI, offline-ready PWA." />
    <meta name="twitter:image"       content="/StoryCraft-Studio/favicon.svg" />

    <!-- ── PWA / Mobile Capable ──────────────────────────── -->
    <meta name="mobile-web-app-capable"            content="yes" />
    <meta name="apple-mobile-web-app-capable"      content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title"        content="StoryCraft" />
    <meta name="msapplication-TileColor"           content="#020617" />
    <meta name="msapplication-tap-highlight"       content="no" />
    <meta name="application-name"                  content="StoryCraft Studio" />

    <!-- ── Security: Content Security Policy ─────────────── -->
    <!--
      CSP-Strategie:
      - script-src: nur eigene Skripte + Tailwind CDN (inline Vite HMR via 'unsafe-inline' in dev)
      - style-src: eigene + Fonts + Tailwind CDN (unsafe-inline nötig für Tailwind utility classes)
      - connect-src: Gemini API + Fonts (kein Wildcard)
      - img-src: data: URLs für Base64-Bilder erlaubt
      - Produktions-CSP wird über HTTP-Header des Hosts verschärft
    -->
    <meta http-equiv="Content-Security-Policy"
          content="
            default-src 'self';
            script-src  'self' 'unsafe-inline' https://cdn.tailwindcss.com;
            style-src   'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.tailwindcss.com;
            font-src    'self' https://fonts.gstatic.com data:;
            img-src     'self' data: blob: https:;
            connect-src 'self' https://generativelanguage.googleapis.com https://fonts.googleapis.com https://fonts.gstatic.com;
            worker-src  'self' blob:;
            manifest-src 'self';
            object-src  'none';
            base-uri    'self';
            form-action 'self';
          " />

    <!-- ── Performance: Preconnect to external origins ───── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin="anonymous" />
    <link rel="preconnect" href="https://fonts.gstatic.com"    crossorigin="anonymous" />
    <link rel="preconnect" href="https://cdn.tailwindcss.com"  crossorigin="anonymous" />

    <title>StoryCraft Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap');

      :root {
        /* Base Palette - Deep Space / Midnight - ULTRA PREMIUM DARK */
        --background-primary: #020617; /* Slate 950 - Deeper black */
        --background-secondary: #0f172a; /* Slate 900 */
        --background-tertiary: #1e293b; /* Slate 800 */
        
        /* Interactive - Electric Indigo */
        --background-interactive: #6366f1; 
        --background-interactive-hover: #4f46e5;
        --background-interactive-subtle: rgba(99, 102, 241, 0.1);
        
        /* Foreground */
        --foreground-primary: #f8fafc;        /* Slate 50 */
        --foreground-secondary: #cbd5e1;      /* Slate 300 */
        --foreground-muted: #64748b;          /* Slate 500 */
        --foreground-interactive: #ffffff;

        /* Borders - Glassy & Refined */
        --border-primary: rgba(255, 255, 255, 0.08);
        --border-highlight: rgba(255, 255, 255, 0.15);
        --border-interactive: #6366f1;

        /* Rings & Glows */
        --ring-focus: rgba(99, 102, 241, 0.6);
        --glow-primary: 0 0 40px -10px rgba(99, 102, 241, 0.3);

        /* Navigation */
        --nav-background-hover: rgba(255, 255, 255, 0.05);
        --nav-background-active: rgba(99, 102, 241, 0.15);
        --nav-text-active: #a5b4fc; 
        --nav-border-active: #6366f1;

        /* Shadows */
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.5);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.5), 0 2px 4px -2px rgb(0 0 0 / 0.5);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.7), 0 4px 6px -4px rgb(0 0 0 / 0.7);
        --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.7), 0 8px 10px -6px rgb(0 0 0 / 0.7);
        
        /* Gradients */
        --gradient-surface: linear-gradient(145deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.0) 100%);
        --background-gradient-overlay-start: rgba(2, 6, 23, 0.0);
      }

      .light-theme {
        /* Paper / Ink - HIGH CONTRAST LIGHT */
        --background-primary: #ffffff; 
        --background-secondary: #f8fafc; /* Slate 50 */
        --background-tertiary: #f1f5f9; /* Slate 100 */
        
        --background-interactive: #4f46e5;
        --background-interactive-hover: #4338ca;
        --background-interactive-subtle: rgba(79, 70, 229, 0.05);
        
        --foreground-primary: #0f172a; /* Slate 900 */
        --foreground-secondary: #475569; /* Slate 600 */
        --foreground-muted: #94a3b8; /* Slate 400 */
        --foreground-interactive: #ffffff;

        --border-primary: #e2e8f0; /* Slate 200 */
        --border-highlight: #cbd5e1; /* Slate 300 */
        --border-interactive: #4f46e5;
        
        --ring-focus: rgba(79, 70, 229, 0.4);
        --glow-primary: 0 0 20px -5px rgba(79, 70, 229, 0.15);
        
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.06), 0 2px 4px -2px rgb(0 0 0 / 0.06);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.08), 0 4px 6px -4px rgb(0 0 0 / 0.08);
        --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.08), 0 8px 10px -6px rgb(0 0 0 / 0.08);

        --nav-background-hover: rgba(0, 0, 0, 0.03);
        --nav-background-active: rgba(79, 70, 229, 0.08);
        --nav-text-active: #4338ca;
        --nav-border-active: #4f46e5;

        --gradient-surface: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%);
        --background-gradient-overlay-start: rgba(255, 255, 255, 0.0);
      }

      html {
        scroll-behavior: smooth;
        height: 100%;
      }

      body {
        background-color: var(--background-primary);
        color: var(--foreground-primary);
        transition: background-color 0.6s cubic-bezier(0.22, 1, 0.36, 1), color 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        overflow: hidden;
        height: 100%;
      }
      
      #root {
        height: 100%;
        width: 100vw;
        position: relative;
        z-index: 1;
      }

      /* Cinematic Grain */
      .noise-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 50;
        opacity: 0.035;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }
      .light-theme .noise-overlay { opacity: 0.025; }

      /* Ambient Lighting - Aurora */
      .aurora-container {
        position: fixed;
        inset: 0;
        z-index: -1;
        overflow: hidden;
        pointer-events: none;
      }
      .aurora-blob {
        position: absolute;
        filter: blur(100px);
        opacity: 0.25;
        border-radius: 50%;
        will-change: transform;
        animation: float 25s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
      }
      .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vh; background: radial-gradient(circle, rgba(99, 102, 241, 0.4), transparent 70%); }
      .blob-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vh; background: radial-gradient(circle, rgba(168, 85, 247, 0.3), transparent 70%); animation-delay: -8s; }
      .blob-3 { top: 40%; left: 30%; width: 40vw; height: 40vh; background: radial-gradient(circle, rgba(59, 130, 246, 0.25), transparent 70%); animation-delay: -15s; }

      @keyframes float {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(8%, 8%) scale(1.15); }
      }

      /* Custom Scrollbar - Minimalist */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background-color: var(--border-primary);
        border-radius: 10px;
        transition: background-color 0.2s;
      }
      ::-webkit-scrollbar-thumb:hover { 
          background-color: var(--foreground-muted); 
      }

      /* Animations */
      .animate-in { 
        animation: fade-in-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        opacity: 0;
        animation-delay: calc(var(--index) * 80ms);
      }
      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .animate-pulse-slow {
        animation: pulse-glow 3s infinite ease-in-out;
      }
      @keyframes pulse-glow {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }

      input[type="range"] {
        -webkit-appearance: none;
        background: var(--background-tertiary);
        border-radius: 999px;
        height: 4px;
        width: 100%;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        background: var(--foreground-primary);
        border-radius: 50%;
        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 0px; 
      }
      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
        box-shadow: 0 0 0 4px var(--background-interactive-subtle);
      }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      .mention-pill {
        display: inline-flex;
        align-items: center;
        padding: 0 6px;
        border-radius: 4px;
        font-weight: 600;
        font-size: 0.9em;
        margin: 0 1px;
        transition: all 0.2s;
        box-decoration-break: clone;
        -webkit-box-decoration-break: clone;
      }
      .mention-pill-character { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.25); }
      .mention-pill-world { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.25); }
      .light-theme .mention-pill-character { color: #2563eb; background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); }
      .light-theme .mention-pill-world { color: #059669; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); }

      .spell-error {
        text-decoration: underline wavy #ef4444;
        text-decoration-thickness: 1.5px;
        cursor: pointer;
        transition: background-color 0.2s;
        text-underline-offset: 3px;
      }
      .spell-error:hover {
        background-color: rgba(239, 68, 68, 0.15);
      }
      
      select option {
        background-color: var(--background-secondary);
        color: var(--foreground-primary);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.1.0/",
    "react": "https://esm.sh/react@^19.1.0",
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/",
    "@google/genai": "https://esm.sh/@google/genai@^1.10.0",
    "jspdf": "https://esm.sh/jspdf@^2.5.1",
    "docx": "https://esm.sh/docx@^8.5.0",

    "@reduxjs/toolkit": "https://esm.sh/@reduxjs/toolkit@^2.2.6",
    "react-redux": "https://esm.sh/react-redux@^9.1.2",
    "redux-undo": "https://esm.sh/redux-undo@^1.1.0",
    "uuid": "https://aistudiocdn.com/uuid@^13.0.0",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.6"
  }
}
</script>
</head>
  <body>
    <div class="noise-overlay"></div>
    <div class="aurora-container">
      <div class="aurora-blob blob-1"></div>
      <div class="aurora-blob blob-2"></div>
      <div class="aurora-blob blob-3"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
